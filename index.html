<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6a11cb">
    <link rel="icon" type="image/png" href="https://i.imgur.com/3kS5fQ9.png">
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --primary-color: #00d2ff;
            --secondary-color: #3a47d5;
            --text-color: #e0e0e0;
            --border-color: #333;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-color);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        header {
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.5em;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ceo-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        main { padding: 25px; }
        .card {
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .tab-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 12px; font-size: 1em; font-weight: bold;
            border: none; border-radius: 8px; cursor: pointer;
            background-color: #333; color: var(--text-color);
            transition: all 0.3s ease;
        }
        .tab-btn.active { background: linear-gradient(90deg, var(--secondary-color), var(--primary-color)); color: white; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #b0b0b0; }
        input, select, textarea {
            width: 100%; padding: 12px; background-color: #333; border: 1px solid var(--border-color);
            border-radius: 8px; color: var(--text-color); font-size: 1em; box-sizing: border-box;
        }
        textarea { resize: vertical; min-height: 80px; }
        .generate-btn {
            width: 100%; padding: 15px; font-size: 1.1em; font-weight: bold; border: none;
            border-radius: 8px; cursor: pointer; color: white; margin-top: 20px;
            background: linear-gradient(90deg, var(--secondary-color), var(--primary-color));
            transition: transform 0.2s ease;
        }
        .generate-btn:active { transform: scale(0.98); }
        .output-area { margin-top: 20px; text-align: center; }
        #generated-image { max-width: 100%; border-radius: 12px; margin-top: 15px; display: none; border: 1px solid var(--border-color); }
        .loader {
            border: 4px solid #333; border-top: 4px solid var(--primary-color);
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
            margin: 20px auto; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        #history-log .history-item {
            background-color: #333; padding: 15px; border-radius: 8px; margin-bottom: 10px;
            border-left: 4px solid var(--primary-color);
        }
        #history-log img { max-width: 100px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <img src="https://i.imgur.com/3kS5fQ9.png" alt="Logo" width="30">
                AI Studio Pro
            </h1>
            <button class="ceo-btn" onclick="openAdmin()">Admin</button>
        </header>

        <main id="main-ui">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="showTab('generator')">AI Generator</button>
                <button class="tab-btn" onclick="showTab('editor')">DP Editor</button>
            </div>

            <div id="generator-tab">
                <div class="card">
                    <form id="generate-form">
                        <label for="use-case">Use Case</label>
                        <select id="use-case">
                            <option value="1024x576">YouTube 16:9</option>
                            <option value="1024x1024" selected>Instagram Post 1:1</option>
                            <option value="1024x1792">Instagram Story 9:16</option>
                            <option value="1792x1024">Facebook Cover 16:9</option>
                        </select>
                        <br><br>
                        <label for="style">Style</label>
                        <select id="style">
                            <option value="Realistic Photo">Real Photo</option>
                            <option value="3D Render">3D Render</option>
                            <option value="Anime">Anime</option>
                            <option value="Cartoon">Cartoon</option>
                            <option value="Digital Art">Digital Art</option>
                        </select>
                        <br><br>
                        <label for="prompt">What To Create *</label>
                        <textarea id="prompt" placeholder="e.g., a cute cat wearing sunglasses"></textarea>
                        <br><br>
                        <label for="add-text">Add Text (Optional)</label>
                        <input type="text" id="add-text" placeholder="Text to appear on image">
                        <button type="submit" class="generate-btn">Generate</button>
                    </form>
                </div>
                <div class="output-area">
                    <div class="loader" id="loader"></div>
                    <img id="generated-image" alt="Generated Image">
                </div>
            </div>

            <div id="editor-tab" class="hidden">
                <div class="card">
                    <p>DP Editor coming soon...</p>
                </div>
            </div>
        </main>

        <main id="admin-panel" class="hidden">
            <div class="card">
                <h2>Admin Panel - CEO View</h2>
                <p>Password protected area. Only you can see this.</p>
                <button class="generate-btn" onclick="closeAdmin()">Back to App</button>
                <h3>Generation History</h3>
                <div id="history-log">
                    <p>No history yet.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Tab switching
        function showTab(tabName) {
            document.getElementById('generator-tab').classList.add('hidden');
            document.getElementById('editor-tab').classList.add('hidden');
            document.getElementById(tabName + '-tab').classList.remove('hidden');
            
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        // CEO Panel Functions
        function openAdmin() {
            const password = prompt("Enter CEO Password:");
            if (password === "@JASHBEER04") {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                renderHistory();
            } else if (password !== null) {
                alert("Access Denied. Incorrect Password.");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        // History Functions
        function saveToHistory(prompt, imageUrl) {
            const history = JSON.parse(localStorage.getItem('ai_studio_history') || '[]');
            history.unshift({
                prompt: prompt,
                imageUrl: imageUrl,
                timestamp: new Date().toLocaleString()
            });
            if (history.length > 20) history.pop();
            localStorage.setItem('ai_studio_history', JSON.stringify(history));
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('ai_studio_history') || '[]');
            const log = document.getElementById('history-log');
            if (history.length === 0) {
                log.innerHTML = '<p>No history yet.</p>';
                return;
            }
            log.innerHTML = history.map(item => `
                <div class="history-item">
                    <strong>Time:</strong> ${item.timestamp}<br>
                    <strong>Prompt:</strong> ${item.prompt}<br>
                    <img src="${item.imageUrl}" alt="History Image">
                </div>
            `).join('');
        }

        // REAL AI GENERATOR - WORKS FOR EVERYTHING
        document.getElementById('generate-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = document.getElementById('prompt').value;
            const style = document.getElementById('style').value;
            const addText = document.getElementById('add-text').value;
            const useCase = document.getElementById('use-case').value;
            
            if (!prompt) {
                alert('Please enter what to create');
                return;
            }

            const loader = document.getElementById('loader');
            const img = document.getElementById('generated-image');
            loader.style.display = 'inline-block';
            img.style.display = 'none';

            const [width, height] = useCase.split('x');
            
            let finalPrompt = `${prompt}, ${style} style, high quality, detailed, 8k`;
            if(addText) finalPrompt += `, text "${addText}"`;
            
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=${width}&height=${height}&nologo=true&enhance=true`;
            
            img.onload = () => {
                loader.style.display = 'none';
                img.style.display = 'block';
                saveToHistory(prompt, imageUrl);
            };
            
            img.onerror = () => {
                loader.style.display = 'none';
                alert('Server busy. Try again in 10 seconds or use different prompt');
            };
            
            img.src = imageUrl;
        });
    </script>
</body>
                  </html>
