<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Studio Pro - CEO Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .ceo-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .ceo-btn:hover {
            background: var(--surface-color);
            color: var(--text-color);
        }

        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        select, input[type="text"], textarea, input[type="file"] {
            width: 100%;
            padding: 12px;
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }

        select:focus, input[type="text"]:focus, textarea:focus {
            border-color: var(--primary-color);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .col {
            flex: 1;
        }

        .btn-generate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--secondary-color), var(--primary-color));
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
            transition: opacity 0.2s;
        }

        .btn-generate:hover {
            opacity: 0.9;
        }

        .result-container {
            margin-top: 30px;
            text-align: center;
        }

        .loader {
            display: none;
            width: 48px;
            height: 48px;
            border: 5px solid var(--surface-color);
            border-bottom-color: var(--primary-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #generated-image, #dp-canvas, #upload-preview {
            max-width: 100%;
            border-radius: 8px;
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-top: 15px;
        }

        #admin-panel {
            display: none;
            margin-top: 20px;
        }

        .history-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            word-break: break-word;
        }

        .history-card img {
            max-width: 100px;
            border-radius: 4px;
            margin-top: 10px;
            display: block;
        }

        .timestamp {
            color: var(--primary-color);
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: block;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AI Studio Pro</h1>
        <button class="ceo-btn" onclick="openAdmin()">Admin</button>
    </header>

    <div id="main-ui">
        <div class="tab-nav">
            <button class="tab-btn active" onclick="openTab('ai-tab')">AI Generate</button>
            <button class="tab-btn" onclick="openTab('dp-tab')">DP Editor</button>
        </div>

        <!-- TAB 1: AI GENERATE - GEMINI WALA AS IT IS -->
        <div id="ai-tab" class="tab-content active">
            <form id="generate-form">
                <div class="form-group">
                    <label for="use-case">Use Case</label>
                    <select id="use-case">
                        <option value="1920x1080">YouTube 16:9</option>
                        <option value="1024x1024">Instagram 1:1</option>
                        <option value="1080x1920">Story 9:16</option>
                        <option value="1024x1024">DP 1:1</option>
                        <option value="1024x1024">Logo 1:1</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="style">Style</label>
                    <select id="style">
                        <option value="Real Photo">Real Photo</option>
                        <option value="Anime">Anime</option>
                        <option value="Digital Art">Digital Art</option>
                        <option value="3D">3D</option>
                        <option value="Logo">Logo</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="prompt">What To Create *</label>
                    <textarea id="prompt" placeholder="Describe what you want to see..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="add-text">Add Text (Optional)</label>
                    <input type="text" id="add-text" placeholder="Text to appear on the image">
                </div>

                <div class="row">
                    <div class="col form-group">
                        <label for="text-color">Text Color</label>
                        <select id="text-color">
                            <option value="White">White</option>
                            <option value="Yellow">Yellow</option>
                            <option value="Red">Red</option>
                            <option value="Black">Black</option>
                        </select>
                    </div>
                    <div class="col form-group">
                        <label for="quality">Quality</label>
                        <select id="quality">
                            <option value="High">High</option>
                            <option value="Fast">Fast</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-generate">GENERATE IMAGE</button>
            </form>

            <div class="result-container">
                <div id="loader" class="loader" style="display: none;"></div>
                <img id="generated-image" src="" alt="Generated Artwork">
            </div>
        </div>

        <!-- TAB 2: DP EDITOR - SIRF YE JODA HAI -->
        <div id="dp-tab" class="tab-content">
            <div class="form-group">
                <label for="dp-upload">1. Upload Your DP</label>
                <input type="file" id="dp-upload" accept="image/*" onchange="previewDP()">
                <img id="upload-preview" src="">
            </div>

            <div class="form-group">
                <label for="dp-text">2. Text To Add On DP</label>
                <input type="text" id="dp-text" placeholder="Example: CEO | Me">
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="dp-text-color">Text Color</label>
                    <select id="dp-text-color">
                        <option value="#FFFFFF">White</option>
                        <option value="#FFFF00">Yellow</option>
                        <option value="#FF0000">Red</option>
                        <option value="#000000">Black</option>
                    </select>
                </div>
                <div class="col form-group">
                    <label for="dp-position">Text Position</label>
                    <select id="dp-position">
                        <option value="bottom">Bottom</option>
                        <option value="top">Top</option>
                        <option value="center">Center</option>
                    </select>
                </div>
            </div>

            <button class="btn-generate" onclick="addTextToDP()">ADD TEXT TO DP</button>
            
            <div class="result-container">
                <canvas id="dp-canvas"></canvas>
                <button class="btn-generate" id="download-dp" style="display:none; margin-top:15px; background:#00ff88;" onclick="downloadDP()">DOWNLOAD DP</button>
            </div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="back-btn" onclick="closeAdmin()">← Back to Generator</button>
        <h2>Generation History</h2>
        <div id="history-container"></div>
    </div>

</div>

<script>
    // TAB SWITCHING
    function openTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // GEMINI WALA CODE - AI GENERATE - KUCH NAHI CHHEDA
    let historyLog = JSON.parse(localStorage.getItem('ceo_history')) || [];

    document.getElementById('generate-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const useCaseStr = document.getElementById('use-case').value;
        const style = document.getElementById('style').value;
        const basePrompt = document.getElementById('prompt').value;
        const textOverlay = document.getElementById('add-text').value;
        const textColor = document.getElementById('text-color').value;
        const quality = document.getElementById('quality').value;
        const [width, height] = useCaseStr.split('x');
        let finalPrompt = basePrompt;

        if (finalPrompt.toLowerCase().includes("doraemon")) {
            finalPrompt = "anime style, Doraemon the blue robotic cat from Japanese anime, round face, red nose, bell collar, " + finalPrompt;
        }

        finalPrompt += `, ${style} style`;

        if (textOverlay.trim() !== "") {
            finalPrompt += `, typography, text "${textOverlay}" written in ${textColor} color`;
        }

        if (quality === "High") {
            finalPrompt += `, 8k resolution, ultra detailed, masterpiece, highly highly detailed, sharp focus, professional`;
        }

        const seed = Math.floor(Math.random() * 9999999);
        const encodedPrompt = encodeURIComponent(finalPrompt);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&seed=${seed}&nologo=true`;

        document.getElementById('generated-image').style.display = 'none';
        document.getElementById('loader').style.display = 'inline-block';

        const imgElement = document.getElementById('generated-image');
        
        imgElement.onload = function() {
            document.getElementById('loader').style.display = 'none';
            imgElement.style.display = 'inline-block';
            
            const historyEntry = {
                timestamp: new Date().toLocaleString(),
                originalPrompt: basePrompt,
                finalPrompt: finalPrompt,
                url: imageUrl
            };
            historyLog.unshift(historyEntry);
            localStorage.setItem('ceo_history', JSON.stringify(historyLog));
        };

        imgElement.onerror = function() {
            document.getElementById('loader').style.display = 'none';
            alert("Failed to generate image. Please try a different prompt.");
        };

        imgElement.src = imageUrl;
    });

    // DP EDITOR KA CODE - SIRF YE NAYA JODA HAI
    function previewDP() {
        const file = document.getElementById('dp-upload').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('upload-preview').src = e.target.result;
                document.getElementById('upload-preview').style.display = "block";
            }
            reader.readAsDataURL(file);
        }
    }

    function addTextToDP() {
        const file = document.getElementById('dp-upload').files[0];
        const text = document.getElementById('dp-text').value.trim();
        if (!file) {
            alert("Error: Please upload your DP first");
            return;
        }
        if (!text) {
            alert("Error: Please enter text to add");
            return;
        }

        const canvas = document.getElementById('dp-canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        const reader = new FileReader();
        
        reader.onload = function(e) {
            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const fontSize = Math.floor(img.width / 15);
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.fillStyle = document.getElementById('dp-text-color').value;
                ctx.strokeStyle = 'black';
                ctx.lineWidth = fontSize / 10;
                ctx.textAlign = 'center';
                
                let y;
                const position = document.getElementById('dp-position').value;
                if (position === 'top') y = fontSize + 20;
                else if (position === 'center') y = img.height / 2;
                else y = img.height - 20;
                
                ctx.strokeText(text, img.width / 2, y);
                ctx.fillText(text, img.width / 2, y);
                
                canvas.style.display = "block";
                document.getElementById('download-dp').style.display = "block";
            }
            img.src = e.target.result;
        }
        reader.readAsDataURL(file);
    }

    function downloadDP() {
        const canvas = document.getElementById('dp-canvas');
        const link = document.createElement('a');
        link.download = 'my-dp.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    // ADMIN PANEL - GEMINI WALA AS IT IS
    function openAdmin() {
        const password = prompt("Enter CEO Password:");
        if (password === "@JASHBEER04") {
            document.getElementById('main-ui').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            renderHistory();
        } else if (password !== null) {
            alert("Access Denied. Incorrect Password.");
        }
    }

    function closeAdmin() {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
    }

    function renderHistory() {
        const container = document.getElementById('history-container');
        container.innerHTML = '';

        if (historyLog.length === 0) {
            container.innerHTML = '<p style="color: var(--text-muted)">No generations found yet.</p>';
            return;
        }

        historyLog.forEach(entry => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.innerHTML = `
                <span class="timestamp">${entry.timestamp}</span>
                <strong>User Input:</strong> ${entry.originalPrompt}<br><br>
                <strong>Engine Prompt:</strong> <span style="color: var(--text-muted); font-size: 0.8rem;">${entry.finalPrompt}</span>
                <a href="${entry.url}" target="_blank">
                    <img src="${entry.url}" alt="Historical Generation" onerror="this.style.display='none'">
                </a>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
  </html>
